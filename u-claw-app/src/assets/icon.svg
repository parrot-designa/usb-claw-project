<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0a0a1a"/>
    </linearGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c"/>
      <stop offset="100%" style="stop-color:#c0392b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg)"/>

  <!-- Outer ring glow -->
  <circle cx="512" cy="512" r="420" fill="none" stroke="#e74c3c" stroke-width="4" opacity="0.2"/>

  <!-- Crayfish Body -->
  <ellipse cx="512" cy="580" rx="200" ry="160" fill="url(#body)"/>

  <!-- Head -->
  <ellipse cx="512" cy="380" rx="140" ry="100" fill="url(#body)"/>

  <!-- Left Claw Arm -->
  <path d="M340 480 Q280 500 240 460 Q200 420 220 380 Q240 340 280 360 Q320 380 340 420Z" fill="url(#body)"/>
  <ellipse cx="210" cy="370" rx="70" ry="50" fill="#c0392b" transform="rotate(-30 210 370)"/>

  <!-- Right Claw Arm -->
  <path d="M684 480 Q744 500 784 460 Q824 420 804 380 Q784 340 744 360 Q704 380 684 420Z" fill="url(#body)"/>
  <ellipse cx="814" cy="370" rx="70" ry="50" fill="#c0392b" transform="rotate(30 814 370)"/>

  <!-- Left Pincer (upper) -->
  <path d="M200 350 Q160 300 180 260 Q200 220 240 240 Q280 260 260 300 Q240 340 200 350Z" fill="#e74c3c"/>
  <path d="M220 340 Q240 280 260 260" fill="none" stroke="#c0392b" stroke-width="8"/>

  <!-- Right Pincer (upper) -->
  <path d="M824 350 Q864 300 844 260 Q824 220 784 240 Q744 260 764 300 Q784 340 824 350Z" fill="#e74c3c"/>
  <path d="M804 340 Q784 280 764 260" fill="none" stroke="#c0392b" stroke-width="8"/>

  <!-- Eyes -->
  <circle cx="460" cy="340" r="22" fill="#ffffff"/>
  <circle cx="564" cy="340" r="22" fill="#ffffff"/>
  <circle cx="465" cy="335" r="10" fill="#1a1a2e"/>
  <circle cx="569" cy="335" r="10" fill="#1a1a2e"/>

  <!-- Antennae -->
  <path d="M460 310 Q440 240 400 200" fill="none" stroke="#e74c3c" stroke-width="6" stroke-linecap="round"/>
  <path d="M564 310 Q584 240 624 200" fill="none" stroke="#e74c3c" stroke-width="6" stroke-linecap="round"/>

  <!-- Mouth/smile -->
  <path d="M480 420 Q512 450 544 420" fill="none" stroke="#c0392b" stroke-width="6" stroke-linecap="round"/>

  <!-- Tail segments -->
  <ellipse cx="512" cy="720" rx="80" ry="35" fill="#c0392b"/>
  <ellipse cx="512" cy="780" rx="60" ry="30" fill="#c0392b"/>
  <path d="M470 800 Q512 850 554 800" fill="#c0392b"/>
</svg>
